<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Earn With Sagar</title>

<script src="https://cdn.tailwindcss.com"></script>

<!-- Icons -->
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
body {
  margin: 0;
  padding: 0;
}

/* Glow effect */
.btn-glow:hover {
  box-shadow: 0 0 20px rgba(255,255,255,0.6);
}
</style>

</head>

<body class="text-white overflow-x-hidden flex flex-col">

<!-- HEADER (Old Style Fixed) -->
<header class="flex items-center bg-gray-900 px-3 py-4 w-full justify-between fixed top-0 z-50">

  <!-- Logo -->
  <div class="flex items-center gap-2">
      <img src="https://tse1.mm.bing.net/th/id/OIP.mU5O-NE9iE36zlcXmEaDWwAAAA?pid=ImgDet&w=203&h=162&c=7" class="w-8 h-8 rounded-full border">
      <span class="font-bold text-green-400">SAGAR</span>
    </div>
  <!-- Menu -->
  <div class="text-green-400 font-bold flex gap-4 text-sm md:text-base">
    <span>YOUTUBE</span>
    <span>INSTAGRAM</span>
    <span>HOME</span>
  </div>

</header>

<!-- MAIN -->
<main class="bg-gradient-to-br from-black via-gray-900 to-black flex items-center justify-center min-h-screen flex-col pt-24 w-full">

  <!-- Title -->
  <h1 class="text-3xl md:text-4xl font-bold mb-10 text-green-400">
    EARN WITH SAGAR
  </h1>

  <!-- Buttons -->
  <div class="grid grid-cols-1 md:grid-cols-3 gap-8 px-6">

    <!-- YouTube -->
    <a href="youtube.html" class="btn-glow bg-red-600 hover:bg-red-700 transition transform hover:scale-110 px-10 py-8 rounded-2xl text-center shadow-xl">
      <i class="fab fa-youtube text-white text-4xl mb-3"></i>
      <p class="font-bold text-lg">YOUTUBE</p>
    </a>

    <!-- Instagram -->
    <a href="instagram.html" class="btn-glow bg-gradient-to-tr from-yellow-400 via-pink-500 to-purple-600 transition transform hover:scale-110 px-10 py-8 rounded-2xl text-center shadow-xl">
      <i class="fab fa-instagram text-white text-4xl mb-3"></i>
      <p class="font-bold text-lg">INSTAGRAM</p>
    </a>

    <!-- Facebook -->
    <a href="facebook.html" class="btn-glow bg-blue-600 hover:bg-blue-700 transition transform hover:scale-110 px-10 py-8 rounded-2xl text-center shadow-xl">
      <i class="fab fa-facebook text-white text-4xl mb-3"></i>
      <p class="font-bold text-lg">FACEBOOK</p>
    </a>

  </div>

</main>

<!-- Footer -->
<footer class="bg-gray-800 text-gray-300 text-center py-4 w-full">
  <p>MR. SAGAR KALME</p>
  <p>© 2026 EarnWithSagar.in</p>
  <p>sagarkalme63@gmail.com</p>
</footer>

</html>
